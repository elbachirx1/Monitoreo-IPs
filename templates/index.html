<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Equipos</title>
    <link rel="stylesheet" href="/static/estilos.css">
</head>
<body>
    <main class="app-container">
        <header class="main-header">
            <h1>Gestión de Infraestructura</h1>
        </header>

        <section class="form-section">
            
            {% if mensaje %}
            <div class="alert-box" style="background-color: #fff3cd; color: #856404; padding: 10px; margin-bottom: 15px; text-align: center;">
                <b>{{ mensaje }}</b>
            </div>
            {% endif %}

            <div class="card">
                <h2>Añadir Dispositivo</h2>
                <form action="/add" method="POST" class="form-group">
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" name="nombre" required>
                    
                    <label for="ip">Dirección IP</label>
                    <input type="text" id="ip" name="ip" placeholder="192.168.X.X" required>

                    <label for="tasa_actualizacion">Tasa de Actualizacion</label>
                    <input type="text" id="tasa_actualizacion" name="tasa_actualizacion" placeholder="3 (segundos)" required >
                    
                    <button type="submit" class="btn-primary">Registrar en Sistema</button>
                </form>
            </div>
            <div class="nav-actions">
                <a href="/panel" class="link-secondary">Ir al Panel de Control →</a>
            </div>
        </section>
    </main>
</body>
</html>
